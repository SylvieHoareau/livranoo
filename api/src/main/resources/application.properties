spring.application.name=api

# Database configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/db_livranoo}
spring.datasource.username=${DB_USERNAME:livranoo_user}
spring.datasource.password=${DB_PASSWORD:password123}

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.show-sql=true

